<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="title">TIC<br>TAC<br>TOE</h1>

    <div class="game-area">
      <p class="status" id="status">Player 1's turn</p>

      <div class="board-wrap">
        <div class="board" id="board">
          <button class="cell" data-index="0"></button>
          <button class="cell" data-index="1"></button>
          <button class="cell" data-index="2"></button>
          <button class="cell" data-index="3"></button>
          <button class="cell" data-index="4"></button>
          <button class="cell" data-index="5"></button>
          <button class="cell" data-index="6"></button>
          <button class="cell" data-index="7"></button>
          <button class="cell" data-index="8"></button>
        </div>
        <div class="overlay hidden" id="overlay">
          <p class="overlay-text" id="overlay-text"></p>
          <button class="replay-btn" id="replay-btn">REPLAY</button>
        </div>
      </div>
    </div>

    <div class="mode-btns">
      <button class="mode-btn active" id="btn-one">1 PLAYER</button>
      <button class="mode-btn" id="btn-two">2 PLAYER</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
